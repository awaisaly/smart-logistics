x-health-http: &health_http
  interval: 10s
  timeout: 5s
  retries: 5

services:
  postgres-user:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: user_service
    ports: ["5441:5432"]
    volumes: [postgres_user_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d user_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-shipment:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: shipment_service
    ports: ["5433:5432"]
    volumes: [postgres_shipment_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d shipment_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-warehouse:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: warehouse_service
    ports: ["5434:5432"]
    volumes: [postgres_warehouse_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d warehouse_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-courier:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: courier_service
    ports: ["5435:5432"]
    volumes: [postgres_courier_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d courier_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-dispatch:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: dispatch_service
    ports: ["5436:5432"]
    volumes: [postgres_dispatch_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d dispatch_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal-postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: temporal
    ports: ["5440:5432"]
    volumes: [temporal_postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d temporal"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-notification:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: notification_service
    ports: ["5437:5432"]
    volumes: [postgres_notification_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d notification_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-ai:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ai_service
    ports: ["5438:5432"]
    volumes: [postgres_ai_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ai_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  timescaledb-analytics:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: analytics_service
    ports: ["5439:5432"]
    volumes: [timescaledb_analytics_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d analytics_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb-warehouse:
    image: mongo:7
    restart: unless-stopped
    ports: ["27017:27017"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes: [mongodb_warehouse_data:/data/db]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb-tracking:
    image: mongo:7
    restart: unless-stopped
    ports: ["27018:27017"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes: [mongodb_tracking_data:/data/db]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: bitnamilegacy/kafka:latest
    restart: unless-stopped
    ports: ["9092:9092"]
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Two broker listeners: INTERNAL for in-Docker clients (advertised as
      # kafka:9094) and EXTERNAL for host-run clients (advertised as
      # localhost:9092). Host services connecting via localhost get redirected
      # to localhost — not the unresolvable kafka:9092 — so they can consume.
      KAFKA_CFG_LISTENERS: INTERNAL://:9094,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:9094,EXTERNAL://localhost:9092
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes: [kafka_data:/bitnami/kafka]
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  schema-registry:
    image: confluentinc/cp-schema-registry:latest
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9094
    ports: ["8081:8081"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:latest
    restart: unless-stopped
    depends_on:
      temporal-postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_SEEDS: temporal-postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
    ports: ["7233:7233"]
    healthcheck:
      disable: true

  temporal-ui:
    image: temporalio/ui:latest
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_started
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports: ["8080:8080"]

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports: ["6333:6333"]
    volumes: [qdrant_data:/qdrant/storage]
    healthcheck:
      disable: true

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports: ["9090:9090"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports: ["3000:3000"]
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning

  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4318:4318"

  api-gateway:
    profiles: ["services"]
    build: ./apps/services/api-gateway
    restart: unless-stopped
    env_file: .env
    ports: ["4000:4000"]
    depends_on:
      user-service: { condition: service_healthy }
      shipment-service: { condition: service_healthy }
      warehouse-service: { condition: service_healthy }
      courier-service: { condition: service_healthy }
      dispatch-service: { condition: service_healthy }
      tracking-service: { condition: service_healthy }
      notification-service: { condition: service_healthy }
      analytics-service: { condition: service_healthy }
      ai-service: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health >/dev/null || exit 1"]
      <<: *health_http

  user-service:
    profiles: ["services"]
    build: ./apps/services/user-service
    restart: unless-stopped
    env_file: .env
    ports: ["4001:4001"]
    depends_on:
      postgres-user: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4001/health >/dev/null || exit 1"]
      <<: *health_http

  shipment-service:
    profiles: ["services"]
    build: ./apps/services/shipment-service
    restart: unless-stopped
    env_file: .env
    ports: ["4002:4002"]
    depends_on:
      postgres-shipment: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
      schema-registry: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4002/health >/dev/null || exit 1"]
      <<: *health_http

  warehouse-service:
    profiles: ["services"]
    build: ./apps/services/warehouse-service
    restart: unless-stopped
    env_file: .env
    ports: ["4003:4003"]
    depends_on:
      postgres-warehouse: { condition: service_healthy }
      mongodb-warehouse: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4003/health >/dev/null || exit 1"]
      <<: *health_http

  courier-service:
    profiles: ["services"]
    build: ./apps/services/courier-service
    restart: unless-stopped
    env_file: .env
    ports: ["4004:4004"]
    depends_on:
      postgres-courier: { condition: service_healthy }
      kafka: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4004/health >/dev/null || exit 1"]
      <<: *health_http

  dispatch-service:
    profiles: ["services"]
    build: ./apps/services/dispatch-service
    restart: unless-stopped
    env_file: .env
    ports: ["4005:4005"]
    depends_on:
      postgres-dispatch: { condition: service_healthy }
      temporal: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4005/health >/dev/null || exit 1"]
      <<: *health_http

  temporal-service:
    profiles: ["services"]
    build: ./apps/services/temporal-service
    restart: unless-stopped
    env_file: .env
    ports: ["4011:4011"]
    depends_on:
      postgres-shipment: { condition: service_healthy }
      postgres-warehouse: { condition: service_healthy }
      postgres-courier: { condition: service_healthy }
      postgres-dispatch: { condition: service_healthy }
      temporal: { condition: service_healthy }
      kafka: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4011/health >/dev/null || exit 1"]
      <<: *health_http

  tracking-service:
    profiles: ["services"]
    build: ./apps/services/tracking-service
    restart: unless-stopped
    env_file: .env
    ports: ["4006:4006"]
    depends_on:
      mongodb-tracking: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4006/health >/dev/null || exit 1"]
      <<: *health_http

  notification-service:
    profiles: ["services"]
    build: ./apps/services/notification-service
    restart: unless-stopped
    env_file: .env
    ports: ["4007:4007"]
    depends_on:
      postgres-notification: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4007/health >/dev/null || exit 1"]
      <<: *health_http

  analytics-service:
    profiles: ["services"]
    build: ./apps/services/analytics-service
    restart: unless-stopped
    env_file: .env
    ports: ["4008:4008"]
    depends_on:
      timescaledb-analytics: { condition: service_healthy }
      kafka: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4008/health >/dev/null || exit 1"]
      <<: *health_http

  ai-service:
    profiles: ["services"]
    build: ./apps/services/ai-service
    restart: unless-stopped
    env_file: .env
    ports: ["4009:4009"]
    depends_on:
      postgres-ai: { condition: service_healthy }
      qdrant: { condition: service_healthy }
      kafka: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4009/health >/dev/null || exit 1"]
      <<: *health_http

  frontend:
    profiles: ["services"]
    build: ./apps/frontend
    restart: unless-stopped
    env_file: .env
    ports: ["5173:5173"]
    depends_on:
      api-gateway: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173 >/dev/null || exit 1"]
      <<: *health_http

volumes:
  postgres_user_data:
  postgres_shipment_data:
  postgres_warehouse_data:
  postgres_courier_data:
  postgres_dispatch_data:
  postgres_notification_data:
  postgres_ai_data:
  timescaledb_analytics_data:
  mongodb_warehouse_data:
  mongodb_tracking_data:
  redis_data:
  kafka_data:
  qdrant_data:
  grafana_data:
  temporal_postgres_data:
