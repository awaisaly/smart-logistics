  dispatch-service:
    volumes:
      - ./apps/services/dispatch-service:/app
    command: sh -c "pnpm install --frozen-lockfile=false && pnpm dev"

  tracking-service:
    volumes:
      - ./apps/services/tracking-service:/app
    command: sh -c "pnpm install --frozen-lockfile=false && pnpm dev"

  notification-service:
