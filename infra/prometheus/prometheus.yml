      - targets: ["api-gateway:4000"]
  - job_name: "user-service"
    static_configs:
      - targets: ["user-service:4001"]
  - job_name: "shipment-service"
    static_configs:
      - targets: ["shipment-service:4002"]
  - job_name: "warehouse-service"
    static_configs:
      - targets: ["warehouse-service:4003"]
  - job_name: "courier-service"
    static_configs:
      - targets: ["courier-service:4004"]
