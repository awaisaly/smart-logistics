    static_configs:
      - targets: ["dispatch-service:4005"]
  - job_name: "tracking-service"
    static_configs:
      - targets: ["tracking-service:4006"]
  - job_name: "notification-service"
    static_configs:
      - targets: ["notification-service:4007"]
